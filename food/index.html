  // === Methodology footer ===
  body += `<div class="insight" style="margin-top:14px">
    <div class="ins-label">Πώς υπολογίζεται</div>
    <div class="ins-text">
      <strong>1.</strong> Παίρνουμε το rolling 6-month average FC% (Actual Cost / Actual Sales) για κάθε store, βάσει ιστορικών δεδομένων.
      <strong>2.</strong> Πολλαπλασιάζουμε με το <strong>budget sales</strong> για ${forecastPeriodLabel}.
      <strong>3.</strong> Αυτό είναι το predicted food cost.
      <br><br>
      <strong>Καλύτερη πρόβλεψη όταν:</strong> το store έχει σταθερό FC% (όχι μεγάλη μεταβολή τους τελευταίους μήνες).
      <strong>Λιγότερο αξιόπιστη όταν:</strong> νέα stores με <6 μήνες ιστορικό, ή stores με μεγάλη μεταβλητότητα.
    </div>
  </div>`;

  root.innerHTML = body;
}

// =====================================================================
// EXCEL EXPORT
// =====================================================================
function exportTable(tabName, contextStore) {
  if (typeof XLSX === 'undefined') {
    alert('Excel library δεν φόρτωσε. Δοκίμασε refresh.');
    return;
  }
  const records = getPeriodRecords(STATE.period, STATE.storeFilter);
  const periodStr = periodLabel(parseInt(STATE.period.slice(0,4)), parseInt(STATE.period.slice(5,7)));
  const viewLabel = STATE.view === 'pure_food' ? 'Pure Food' : 'Total Cost';
  
  let aoa = [];
  let sheetName = '';
  let filenameSuffix = '';
  
  if (tabName === 'overview') {
    sheetName = 'GAP Ranking';
    filenameSuffix = 'GAP_Ranking';
    aoa.push(['Period', STATE.period, 'View', viewLabel, 'Store filter', STATE.storeFilter]);
    aoa.push([]);
    aoa.push(['#','Store','Theoretical','Actual','GAP €','GAP %','WASTE €','DEVIATION €']);
    const rows = records.map(r => {
      const v = r[STATE.view];
      const gap = v.other_cost;
      const waste = r.waste.cost;
      return {
        store: r.store, ideal: v.ideal_cost, actual: v.total_cost,
        gap, waste, deviation: gap - waste,
        gapPct: v.ideal_cost ? gap/v.ideal_cost*100 : 0,
      };
    }).filter(r => r.ideal > 100).sort((a,b) => a.gapPct - b.gapPct);
    rows.forEach((r,i) => aoa.push([
      i+1, r.store, r.ideal, r.actual, r.gap, r.gapPct/100, r.waste, r.deviation
    ]));
  }
  else if (tabName === 'variance') {
    sheetName = 'GAP Analysis';
    filenameSuffix = 'GAP_Analysis_' + (contextStore || 'all');
    aoa.push(['Period', STATE.period, 'Store', contextStore || 'all']);
    aoa.push([]);
    aoa.push(['#','Ingredient','Category','Theoretical','Actual','GAP €','% of total']);
    const stores = contextStore ? [contextStore] : Object.keys(DATA.top_variances_latest).sort();
    for (const store of stores) {
      const items = DATA.top_variances_latest[store] || [];
      if (items.length === 0) continue;
      if (stores.length > 1) {
        aoa.push([]); aoa.push([`=== ${store} ===`]);
      }
      const totalGap = items.reduce((s,x) => s+x.other_cost, 0);
      items.forEach((it,i) => aoa.push([
        i+1, it.desc, it.category,
        it.ideal_cost, it.total_cost, it.other_cost,
        totalGap ? it.other_cost/totalGap : 0
      ]));
    }
  }
  else if (tabName === 'categories') {
    sheetName = 'Categories';
    filenameSuffix = 'Categories';
    aoa.push(['Period', STATE.period, 'View', viewLabel, 'Store filter', STATE.storeFilter]);
    aoa.push([]);
    aoa.push(['#','Category','Theoretical','Actual','GAP €','GAP %','Mix %']);
    const agg = aggregateRecords(records);
    const cats = Object.entries(agg.byCategory)
      .map(([cat, vals]) => ({
        cat, ideal: vals.ideal, actual: vals.actual, gap: vals.gap,
        gapPct: vals.ideal ? vals.gap/vals.ideal*100 : 0,
      }))
      .filter(c => c.ideal > 100).sort((a,b) => b.actual - a.actual);
    const totalActual = cats.reduce((s,c) => s + c.actual, 0);
    cats.forEach((c,i) => aoa.push([
      i+1, c.cat, c.ideal, c.actual, c.gap, c.gapPct/100,
      totalActual ? c.actual/totalActual : 0
    ]));
  }
  else if (tabName === 'waste') {
    sheetName = 'WASTE Detail';
    filenameSuffix = 'WASTE_Detail';
    aoa.push(['Period', STATE.period, 'View', viewLabel, 'Store filter', STATE.storeFilter]);
    aoa.push([]);
    aoa.push(['#','Store','Actual Cost','GAP €','WASTE €','WASTE %','DEVIATION €']);
    const rows = records.map(r => {
      const v = r[STATE.view];
      const gap = v.other_cost;
      const waste = r.waste.cost;
      return {
        store: r.store, actual: v.total_cost, gap, waste,
        deviation: gap - waste,
        wastePct: v.total_cost ? waste/v.total_cost*100 : 0,
      };
    }).filter(r => r.actual > 100).sort((a,b) => b.wastePct - a.wastePct);
    rows.forEach((r,i) => aoa.push([
      i+1, r.store, r.actual, r.gap, r.waste, r.wastePct/100, r.deviation
    ]));
  }
  else if (tabName === 'wasteqty') {
    sheetName = 'WASTE Quantity';
    filenameSuffix = 'WASTE_Qty';
    aoa.push(['#', 'Code', 'Description', 'Unit', 'Ideal Qty', 'Other Qty', 'Total Qty', 'Waste %']);
    const items = (DATA.qty_per_item?.items || []).slice();
    const sk = STATE.wqSort || 'waste_pct';
    const sd = (STATE.wqSearch || '').toLowerCase().trim();
    const filt = sd ? items.filter(i => i.code.toLowerCase().includes(sd) || i.description.toLowerCase().includes(sd)) : items;
    filt.sort((a, b) => {
      if (sk === 'code') return a.code.localeCompare(b.code);
      if (sk === 'waste_pct') return Math.abs(b.waste_pct) - Math.abs(a.waste_pct);
      return Math.abs(b[sk]) - Math.abs(a[sk]);
    });
    filt.forEach((item, i) => {
      aoa.push([i+1, item.code, item.description, item.unit, item.ideal_qty, item.other_qty, item.total_qty, item.waste_pct]);
    });
  }
  else if (tabName === 'realtime_stores') {
    sheetName = 'Realtime Stores';
    filenameSuffix = 'RT_Stores';
    aoa.push(['#','Store','Sales','FC','FC%','vs Chain pp','Quantity']);
    (DATA.realtime?.per_store || []).forEach((s, i) => {
      aoa.push([i+1, s.store, s.sales, s.fc, s.fc_pct, s.vs_chain_pp, s.qty]);
    });
  }
  else if (tabName === 'realtime_topfc') {
    sheetName = 'Top FC';
    filenameSuffix = 'RT_TopFC';
    aoa.push(['#','Product','Category','Qty','Sales','FC','FC%','Contribution %']);
    (DATA.realtime?.top_fc || []).forEach((p, i) => {
      aoa.push([i+1, p.product, p.category, p.qty, p.sales, p.fc, p.fc_pct, p.contribution_pp]);
    });
  }
  else if (tabName === 'products') {
    sheetName = 'Products';
    filenameSuffix = `Products_${STATE.productKind}`;
    aoa.push(['Filter', `Kind=${STATE.productKind} · Category=${STATE.productCategory}`, 'Sort', STATE.productSort]);
    aoa.push([]);
    aoa.push(['#','Product','Category','Tier','Quantity','Sales','FC','FC%','Avg Sale','Avg GM','Rating']);
    let products = (DATA.product_profit || []).map(p => ({...p, kind: classifyProductKind(p), ...classifyProductTier(p)}));
    if (STATE.productKind !== 'all') products = products.filter(p => p.kind === STATE.productKind);
    if (STATE.productCategory !== 'all') products = products.filter(p => p.category === STATE.productCategory);
    products = products.filter(p => p.qty > 0 && p.sales > 0);
    const dir = STATE.productSortDir === 'desc' ? -1 : 1;
    products.sort((a, b) => ((a[STATE.productSort] || 0) - (b[STATE.productSort] || 0)) * dir);
    products.forEach((p, i) => aoa.push([
      i+1, p.product, p.category, p.label,
      p.qty, p.sales, p.fc, p.fc_pct,
      p.avg_sale, p.avg_gm, p.rating
    ]));
  }
  else if (tabName === 'forecast') {
    sheetName = 'Forecast';
    // Reuse the logic from renderForecast
    const [lyStr, lmStr] = DATA.meta.latest_period.split('-');
    let ly = parseInt(lyStr), lm = parseInt(lmStr);
    let fy = ly, fm = lm + 1;
    if (fm > 12) { fm = 1; fy++; }
    const forecastPeriod = `${fy}-${String(fm).padStart(2,'0')}`;
    filenameSuffix = 'Forecast_' + forecastPeriod;
    aoa.push(['Forecast for', forecastPeriod, 'Based on', 'Rolling 6-month FC%', 'View', viewLabel]);
    aoa.push([]);
    aoa.push(['#','Store','Budget Sales','Avg FC% (6mo)','Predicted Cost','Sample months']);
    
    const stores = STATE.storeFilter === 'ALL' ? DATA.meta.kfc_stores : [STATE.storeFilter];
    const rows = [];
    for (const store of stores) {
      const fcInfo = computeRollingFCpct(store, ly, lm, 6);
      const budgetSales = getMonthlyBudget(store, fy, fm);
      if (!fcInfo || budgetSales < 100) continue;
      rows.push({
        store, fcPct: fcInfo.avgPct, samples: fcInfo.samples.length,
        budgetSales, forecastCost: budgetSales * fcInfo.avgPct,
      });
    }
    rows.sort((a, b) => b.forecastCost - a.forecastCost);
    rows.forEach((r,i) => aoa.push([
      i+1, r.store, r.budgetSales, r.fcPct, r.forecastCost, r.samples
    ]));
  }
  else if (tabName === 'trend') {
    sheetName = 'Trend';
    filenameSuffix = 'Trend';
    aoa.push(['View', viewLabel, 'Store filter', STATE.storeFilter]);
    aoa.push([]);
    aoa.push(['Period','Year','Month','Theoretical','Actual','GAP €','GAP %']);
    const periodKeys = DATA.meta.periods;
    for (const p of periodKeys) {
      const [y, m] = p.split('-').map(Number);
      let recs = DATA.monthly.filter(r => r.year === y && r.month === m);
      if (STATE.storeFilter !== 'ALL') recs = recs.filter(r => r.store === STATE.storeFilter);
      let ideal = 0, actual = 0;
      for (const r of recs) {
        ideal += r[STATE.view].ideal_cost;
        actual += r[STATE.view].total_cost;
      }
      const gap = actual - ideal;
      const gapPct = ideal ? gap/ideal : 0;
      aoa.push([p, y, m, ideal, actual, gap, gapPct]);
    }
  }
  
  // Build workbook
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  XLSX.utils.book_append_sheet(wb, ws, sheetName);
  const filename = `TB_FoodCost_${filenameSuffix}_${STATE.period}.xlsx`;
  XLSX.writeFile(wb, filename);
}

// Re-render on resize
window.addEventListener('resize', () => {
  if (DATA) render();
});
</script>
